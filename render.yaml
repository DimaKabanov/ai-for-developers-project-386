services:
  - type: web
    name: calendar-booking
    runtime: docker
    repo: https://github.com/tota-dev/calendar-booking
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 3000
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_MASTER_KEY
        generateValue: true
    healthCheckPath: /up
    plan: free
    autoDeploy: true
