openapi: 3.0.0
info:
  title: Calendar Booking API
  version: 0.0.0
tags:
  - name: Owner
  - name: Guest
paths:
  /admin/bookings:
    get:
      operationId: BookingManagement_listUpcomingBookings
      summary: Список предстоящих бронирований
      description: |-
        Получить список предстоящих бронирований по всем типам событий.
        Бронирования отсортированы по startTime (ближайшие первыми).
        Возвращаются только бронирования со статусом confirmed и startTime >= now.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
      tags:
        - Owner
  /admin/event-types:
    post:
      operationId: EventTypeManagement_createEventType
      summary: Создать тип события
      description: |-
        Создать новый тип события.
        Владелец задаёт id, название, описание и длительность в минутах.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum:
                      - EVENT_TYPE_ID_CONFLICT
                  message:
                    type: string
                required:
                  - code
                  - message
        '422':
          description: Client error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum:
                      - VALIDATION_ERROR
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                required:
                  - code
                  - message
                  - details
      tags:
        - Owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventTypeRequest'
    get:
      operationId: EventTypeManagement_listEventTypes
      summary: Список типов событий
      description: Получить список всех типов событий.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
      tags:
        - Owner
  /admin/event-types/{id}:
    put:
      operationId: EventTypeManagement_updateEventType
      summary: Обновить тип события
      description: Обновить существующий тип события.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum:
                      - EVENT_TYPE_NOT_FOUND
                  message:
                    type: string
                required:
                  - code
                  - message
        '422':
          description: Client error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum:
                      - VALIDATION_ERROR
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                required:
                  - code
                  - message
                  - details
      tags:
        - Owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventTypeRequest'
    delete:
      operationId: EventTypeManagement_deleteEventType
      summary: Удалить тип события
      description: Удалить тип события.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum:
                      - EVENT_TYPE_NOT_FOUND
                  message:
                    type: string
                required:
                  - code
                  - message
      tags:
        - Owner
  /public/event-types:
    get:
      operationId: EventTypeBrowse_listEventTypes
      summary: Список видов брони
      description: |-
        Получить список доступных видов брони.
        Гость видит название, описание и длительность каждого типа.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventTypeSummary'
      tags:
        - Guest
  /public/event-types/{id}/bookings:
    post:
      operationId: EventTypeBrowse_createBooking
      summary: Создать бронирование
      description: |-
        Создать бронирование на выбранный слот.

        Правила:
        - startTime должен быть в пределах ближайших 14 дней.
        - startTime должен совпадать с началом слота из сетки:
        рабочие часы 09:00-18:00 UTC, шаг = durationMinutes выбранного типа.
        - Слот считается занятым если любое бронирование пересекается
        по времени с [startTime, startTime + durationMinutes], вне зависимости
        от типа события.
        - При конфликте возвращается 409 Conflict.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum:
                      - EVENT_TYPE_NOT_FOUND
                  message:
                    type: string
                required:
                  - code
                  - message
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingConflictError'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum:
                      - VALIDATION_ERROR
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                required:
                  - code
                  - message
                  - details
      tags:
        - Guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
  /public/event-types/{id}/slots:
    get:
      operationId: EventTypeBrowse_listAvailableSlots
      summary: Доступные слоты на ближайшие 14 дней
      description: |-
        Получить доступные временные слоты для выбранного типа события.

        Правила формирования слотов:
        - Окно: [текущая дата, текущая дата + 14 дней]
        - Рабочие часы: 09:00-18:00 UTC
        - Шаг сетки слотов равен durationMinutes выбранного типа события
        - endTime каждого слота = startTime + durationMinutes типа события
        - Слот недоступен (isAvailable: false), если на этот временной
        промежуток уже существует хотя бы одно бронирование любого типа.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Slot'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum:
                      - EVENT_TYPE_NOT_FOUND
                  message:
                    type: string
                required:
                  - code
                  - message
      tags:
        - Guest
  /public/owner:
    get:
      operationId: OwnerProfile_getPublicInfo
      summary: Информация о владельце календаря
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
      tags:
        - Guest
components:
  schemas:
    Booking:
      type: object
      required:
        - id
        - eventTypeId
        - eventTypeName
        - startTime
        - endTime
        - guestName
        - guestEmail
        - status
        - createdAt
      properties:
        id:
          type: string
          description: Уникальный идентификатор бронирования
        eventTypeId:
          type: string
          description: Идентификатор типа события
        eventTypeName:
          type: string
          description: Название типа события (денормализовано для удобства отображения)
        startTime:
          type: string
          format: date-time
          description: Дата и время начала встречи (ISO 8601)
        endTime:
          type: string
          format: date-time
          description: Дата и время окончания встречи (ISO 8601)
        guestName:
          type: string
          description: Имя гостя
        guestEmail:
          type: string
          description: Email гостя
        guestNote:
          type: string
          description: Примечание гостя (опционально)
        status:
          allOf:
            - $ref: '#/components/schemas/BookingStatus'
          description: Статус бронирования
        createdAt:
          type: string
          format: date-time
          description: Дата и время создания бронирования (ISO 8601)
      description: |-
        Бронирование слота гостем.
        На одно и то же время не может существовать двух бронирований,
        даже если они относятся к разным типам событий.
    BookingConflictError:
      type: object
      required:
        - code
        - message
        - conflictingStartTime
      properties:
        code:
          type: string
          enum:
            - SLOT_ALREADY_BOOKED
          description: Код ошибки
        message:
          type: string
          description: Человекочитаемое сообщение
        conflictingStartTime:
          type: string
          format: date-time
          description: Начало занятого слота
      description: Ошибка конфликта при попытке забронировать уже занятый слот
    BookingStatus:
      type: string
      enum:
        - confirmed
        - cancelled
      description: Статус бронирования
    CreateBookingRequest:
      type: object
      required:
        - startTime
        - guestName
        - guestEmail
      properties:
        startTime:
          type: string
          format: date-time
          description: |-
            Дата и время начала желаемого слота (ISO 8601).
            Должна входить в окно ближайших 14 дней от текущей даты.
            Если слот уже занят, сервер вернёт 409 Conflict.
        guestName:
          type: string
          description: Имя гостя (обязательно)
        guestEmail:
          type: string
          description: Email гостя (обязательно)
        guestNote:
          type: string
          description: Примечание к встрече (опционально)
      description: Тело запроса для создания бронирования гостем
    CreateEventTypeRequest:
      type: object
      required:
        - id
        - name
        - description
        - durationMinutes
      properties:
        id:
          type: string
          description: Уникальный идентификатор (задаётся владельцем)
        name:
          type: string
          description: Название типа события
        description:
          type: string
          description: Описание типа события
        durationMinutes:
          type: integer
          format: int32
          description: Длительность встречи в минутах
      description: Тело запроса для создания типа события
    EventType:
      type: object
      required:
        - id
        - name
        - description
        - durationMinutes
      properties:
        id:
          type: string
          description: Уникальный идентификатор типа события
        name:
          type: string
          description: Название типа события, отображаемое гостям
        description:
          type: string
          description: Описание типа события
        durationMinutes:
          type: integer
          format: int32
          description: Длительность встречи в минутах
      description: |-
        Тип события, созданный владельцем календаря.
        Определяет категорию встречи с её названием, описанием и длительностью.
    EventTypeSummary:
      type: object
      required:
        - id
        - name
        - description
        - durationMinutes
      properties:
        id:
          type: string
          description: Уникальный идентификатор типа события
        name:
          type: string
          description: Название типа события
        description:
          type: string
          description: Описание типа события
        durationMinutes:
          type: integer
          format: int32
          description: Длительность встречи в минутах
      description: |-
        Публичное представление типа события для гостей.
        Содержит только данные, необходимые для выбора встречи.
    Owner:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: Уникальный идентификатор владельца
        name:
          type: string
          description: Отображаемое имя владельца
      description: |-
        Владелец календаря. Единственный предзаданный профиль в системе.
        Регистрация и авторизация отсутствуют — профиль используется по умолчанию
        в административной части приложения.
    Slot:
      type: object
      required:
        - id
        - startTime
        - endTime
        - isAvailable
      properties:
        id:
          type: string
          description: Уникальный идентификатор слота
        startTime:
          type: string
          format: date-time
          description: Дата и время начала слота (ISO 8601)
        endTime:
          type: string
          format: date-time
          description: |-
            Дата и время окончания слота (ISO 8601).
            Вычисляется как startTime + durationMinutes выбранного типа события.
        isAvailable:
          type: boolean
          description: |-
            Доступен ли слот для бронирования.
            false — если на это время уже есть хотя бы одно бронирование
            (даже для другого типа события).
      description: |-
        Временной слот для записи.
        Слоты формируются на 14 дней начиная с текущей даты.
        Слот считается занятым, если на него создано хотя бы одно бронирование
        вне зависимости от типа события.
    SlotQueryParams:
      type: object
      required:
        - eventTypeId
      properties:
        eventTypeId:
          type: string
          description: |-
            Идентификатор типа события.
            Используется для вычисления endTime каждого слота.
      description: Параметры запроса свободных слотов
    UpdateEventTypeRequest:
      type: object
      required:
        - name
        - description
        - durationMinutes
      properties:
        name:
          type: string
          description: Название типа события
        description:
          type: string
          description: Описание типа события
        durationMinutes:
          type: integer
          format: int32
          description: Длительность встречи в минутах
      description: Тело запроса для обновления типа события
servers:
  - url: http://localhost:3000
    description: Local development server
    variables: {}
